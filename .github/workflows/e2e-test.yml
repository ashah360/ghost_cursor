name: e2e-test

# Shape 1 — E2E TEST (facts): real Hermes core + the real Cursor REST API,
# no mocks. Asserts the cursor tools are actually invoked and do real work with
# no errors, across every handle-interface shape (start/status/resume/stop/
# same-repo-guard/bogus-handle). Blocking on PRs to main so tool regressions
# can't merge.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *"

concurrency:
  group: e2e-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GHOST_CURSOR_TEST_MODEL: gpt-5.4-nano
      GHOST_CURSOR_E2E: "1"
      # Sessions need a checkout with a real GitHub origin remote (the cloud
      # runtime derives repo url + starting ref from it). The repo must be one
      # the CURSOR_API_KEY account's GitHub connection can see — cursor's
      # create verifies the branch server-side, and a public repo outside that
      # connection is REJECTED (verified live: this repo 400s, the smoke repo
      # works). Override via the GHOST_CURSOR_E2E_REPO repository variable.
      GHOST_CURSOR_E2E_REPO: ${{ vars.GHOST_CURSOR_E2E_REPO || 'https://github.com/waseemshahwan/machine-smoke-test' }}
      GHOST_CURSOR_E2E_BRANCH: ${{ vars.GHOST_CURSOR_E2E_BRANCH || 'main' }}
      CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with: { path: ghost_cursor }
      - uses: actions/checkout@v4
        with: { repository: NousResearch/hermes-agent, path: hermes-agent }
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - uses: astral-sh/setup-uv@v5

      - name: Install the cursor agent CLI (runtime=local worker)
        run: |
          set -euo pipefail
          curl https://cursor.com/install -fsS | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify agent CLI + API key present (fail fast)
        run: |
          set -euo pipefail
          "$HOME/.local/bin/agent" --version
          test -n "$CURSOR_API_KEY" || { echo "CURSOR_API_KEY secret missing"; exit 1; }

      - name: Worker preflight — spawn a detached worker like the plugin does
        run: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"
          d="$RUNNER_TEMP/worker-preflight/repo"; mkdir -p "$d"; cd "$d"
          git -c user.email=e@e -c user.name=e init -q -b "$GHOST_CURSOR_E2E_BRANCH"
          git remote add origin "$GHOST_CURSOR_E2E_REPO"
          touch .gitkeep
          git -c user.email=e@e -c user.name=e add .
          git -c user.email=e@e -c user.name=e commit -q -m seed
          log="$RUNNER_TEMP/worker-preflight/worker.log"
          setsid agent worker start --verbose --name "preflight-$RANDOM" --worker-dir "$d" >"$log" 2>&1 < /dev/null &
          pid=$!
          for i in $(seq 1 60); do
            grep -q "Worker is now running" "$log" 2>/dev/null && { echo "worker ready"; head -20 "$log"; kill "$pid" 2>/dev/null || true; exit 0; }
            kill -0 "$pid" 2>/dev/null || { echo "worker DIED during startup — log:"; cat "$log"; exit 1; }
            sleep 1
          done
          echo "worker never reported ready — log:"; cat "$log"; exit 1

      - name: Install plugin + tests into the Hermes tree
        run: |
          set -euo pipefail
          mkdir -p hermes-agent/plugins/ghost_cursor hermes-agent/tests/plugins/e2e
          cp ghost_cursor/*.py hermes-agent/plugins/ghost_cursor/
          cp ghost_cursor/test_ghost_cursor_plugin.py hermes-agent/tests/plugins/test_ghost_cursor_plugin.py
          cp ghost_cursor/conftest.py hermes-agent/tests/plugins/conftest.py
          cp -r ghost_cursor/fixtures hermes-agent/tests/plugins/fixtures 2>/dev/null || true
          cp ghost_cursor/tests/e2e/test_e2e.py hermes-agent/tests/plugins/e2e/
          rm -f hermes-agent/plugins/ghost_cursor/test_ghost_cursor_plugin.py hermes-agent/plugins/ghost_cursor/conftest.py

      - name: Install deps
        working-directory: hermes-agent
        run: |
          set -euo pipefail
          python -m pip install -U pip pytest pytest-timeout
          uv sync --frozen || uv sync || pip install -e .

      - name: E2E test — every handle shape (real cursor, no mocks)
        working-directory: hermes-agent
        env:
          PYTHONPATH: ${{ github.workspace }}/hermes-agent
          GHOST_CURSOR_PLUGIN_INIT: ${{ github.workspace }}/hermes-agent/plugins/ghost_cursor/__init__.py
        run: |
          set -euo pipefail
          uv run --with pytest --with pytest-timeout --with httpx pytest tests/plugins/e2e/test_e2e.py -q -v \
            -p no:cacheprovider --timeout=300 --timeout-method=thread

      - name: Spawn diagnostics (temporary — GHOST_CURSOR_SPAWN_DIAG)
        if: always()
        run: |
          echo "=== diag files ==="
          for f in "$RUNNER_TEMP"/gc-spawn-diag-*.txt; do
            [ -e "$f" ] || { echo "(none)"; break; }
            echo "--- $f"; cat "$f"
          done
          echo "=== plugin worker logs ==="
          find /tmp/pytest-of-runner -path '*ghost_cursor/workers*' -name '*.log' \
            -exec sh -c 'echo "--- $1 ($(wc -c < "$1") bytes)"; tail -c 2000 "$1"' _ {} \; 2>/dev/null || true
          echo "=== surviving agent processes ==="
          ps -eo pid,stat,etime,command | grep -i agent | grep -v grep || echo "(none)"
