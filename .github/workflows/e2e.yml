name: e2e

# Real end-to-end tests: real Hermes core + real cursor-agent, NO MOCKS.
# Exercises every input shape of the v0.3 handle interface against a live
# cheap model. Opt-in / scheduled — NOT blocking on every push, because a
# real LLM call is nondeterministic and occasionally slow (that's the cost
# of "don't mock cursor, don't mock hermes").

on:
  workflow_dispatch:        # run on demand
  schedule:
    - cron: "0 7 * * *"     # daily 07:00 UTC

concurrency:
  group: e2e
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      # Cheap, fast model for CI. Override in repo settings if the slug drifts.
      GHOST_CURSOR_TEST_MODEL: gpt-5.4-nano-low
      GHOST_CURSOR_E2E: "1"
      CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
    steps:
      - name: Check out ghost_cursor
        uses: actions/checkout@v4
        with:
          path: ghost_cursor

      - name: Check out Hermes Agent (real core — no mocks)
        uses: actions/checkout@v4
        with:
          repository: NousResearch/hermes-agent
          path: hermes-agent

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install cursor-agent (real binary)
        run: |
          curl https://cursor.com/install -fsS | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify cursor-agent authenticates (fail fast if the key is bad)
        run: |
          set -euo pipefail
          cd /tmp
          out=$(cursor-agent -p "reply with exactly: CI-OK" \
            --model "$GHOST_CURSOR_TEST_MODEL" --output-format json --force --trust 2>&1 || true)
          echo "$out"
          echo "$out" | grep -q '"is_error":false' || { echo "cursor-agent auth/model check failed"; exit 1; }

      - name: Install the plugin into the Hermes tree
        run: |
          set -euo pipefail
          mkdir -p hermes-agent/plugins/ghost_cursor
          cp ghost_cursor/*.py hermes-agent/plugins/ghost_cursor/
          # tests live in the repo; run them against the installed plugin
          mkdir -p hermes-agent/tests/plugins/e2e
          cp -r ghost_cursor/tests/e2e/* hermes-agent/tests/plugins/e2e/ 2>/dev/null || true

      - name: Install Python deps (real Hermes deps the plugin touches)
        working-directory: hermes-agent
        run: |
          set -euo pipefail
          python -m pip install -U pip pytest
          # The plugin imports hermes_constants + tools.* + hermes_cli.config.
          # A full `uv sync` installs the whole core; do it so imports are real.
          uv sync --frozen || uv sync || pip install -e .

      - name: Unit tests (fast, deterministic, no network)
        working-directory: hermes-agent
        run: |
          set -euo pipefail
          cp ../ghost_cursor/test_ghost_cursor_plugin.py tests/plugins/test_ghost_cursor_plugin.py
          cp ../ghost_cursor/conftest.py tests/plugins/conftest_ghost_cursor.py || true
          uv run pytest tests/plugins/test_ghost_cursor_plugin.py -q

      - name: E2E tests (real cursor + real hermes, every input shape)
        working-directory: hermes-agent
        env:
          PYTHONPATH: ${{ github.workspace }}/hermes-agent
        run: |
          set -euo pipefail
          uv run pytest tests/plugins/e2e/test_e2e.py -q -v
