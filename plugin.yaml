name: ghost_cursor
version: 0.6.0
description: "Delegate coding tasks to Cursor cloud agents (direct REST v1 API + SSE event stream — no sdk, no sidecar) via explicit NAMED sessions. `cursor_create_session` registers the caller-provided session title as THE handle — a concise meaningful phrase, e.g. 'Fix payment webhook retries' (cursor agent ids resolve as aliases; an omitted title falls back to '<repo-basename> session') — and dispatches nothing — the cursor agent is created lazily on the first `cursor_send_message`, which carries ALL work: first message = the task, later messages = follow-ups (honest interrupt-and-re-prompt when a run is live). runtime='local' (default) executes on THIS machine via a plugin-managed detached 'My Machines' worker; runtime='cloud' runs on a cursor-hosted VM (the repo may be a plain GitHub URL). `cursor_status` is a strictly read-only progress view; `cursor_stop` cancels gracefully (native REST cancel); `cursor_events` pages the per-session JSONL event log (tail by default, negative offsets, kind filter, 2KB inline clip + 20KB response cap); `cursor_list` shows session handles as TSV, scoped to the current Hermes session by default. ALL tool returns are plain text (labeled headers, prose, raw fenced diffs — never JSON blobs). Completions are delivered into the session on every terminal state via the shared completion queue. Same-repo concurrency guarded; different repos run in parallel; inactivity-based timeouts with an optional max-wall ceiling; dropped SSE streams re-attach transparently (Last-Event-ID) and sessions resume across restarts (agent follow-up). Auth via CURSOR_API_KEY. BREAKING vs 0.5: the cursor-sdk transport (and its local bridge) is replaced by the REST API — bridge-era sessions cannot be continued (create fresh ones); tool names, parameters and output formats are unchanged apart from the new `runtime` and `title` create params."
author: Arman
kind: backend
provides_tools:
  - cursor_create_session
  - cursor_send_message
  - cursor_status
  - cursor_stop
  - cursor_events
  - cursor_list
  - cursor_subscribe
