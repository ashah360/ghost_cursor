name: ghost_cursor
version: 0.3.0
description: "Delegate coding tasks to the Cursor agent (cursor-agent CLI over ACP — JSON-RPC on stdio). Registers two tools: `cursor_edit` runs cursor-agent inside a target repo (synchronously, or as a non-blocking background job via background=true / auto-promote-on-overrun), streams per-edit progress (reasoning + file diffs), and returns a structured summary of files changed — background completions are delivered into the session on every terminal state via the shared completion queue; `cursor_status` is a strictly read-only live-progress view over running/finished jobs. Native session/cancel on interrupt; same-repo concurrency guarded. Tools gate on the cursor-agent binary being installed."
author: Arman
kind: backend
provides_tools:
  - cursor_edit
  - cursor_status
