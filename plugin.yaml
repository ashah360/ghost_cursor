name: ghost_cursor
version: 0.5.0
description: "Delegate coding tasks to the Cursor agent (official cursor-sdk python package — local bridge, typed SDKMessage stream) via explicit NAMED sessions. `cursor_create_session` mints a memorable adjective-adjective-noun handle (e.g. playful-space-bunny; cursor agent ids resolve as aliases) and dispatches nothing — the cursor agent is created lazily on the first `cursor_send_message`, which carries ALL work: first message = the task, later messages = follow-ups (honest interrupt-and-re-prompt when a run is live). `cursor_status` is a strictly read-only progress view; `cursor_stop` cancels gracefully (native run.cancel()); `cursor_events` pages the per-session JSONL event log (tail by default, negative offsets, kind filter, 2KB inline clip + 20KB response cap); `cursor_list` shows session handles as TSV, scoped to the current Hermes session by default. ALL tool returns are plain text (labeled headers, prose, raw fenced diffs — never JSON blobs). Completions are delivered into the session on every terminal state via the shared completion queue. Same-repo concurrency guarded; different repos run in parallel; inactivity-based timeouts with an optional max-wall ceiling; dropped event streams re-attach transparently (run.observe) and sessions resume across restarts (Agent.resume). Tools gate on the cursor-sdk package being importable; auth via CURSOR_API_KEY. BREAKING vs 0.4: the ACP transport (cursor-agent binary) is replaced by the cursor-sdk — install with `pip install cursor-sdk` and export CURSOR_API_KEY; tool names, parameters and output formats are unchanged."
author: Arman
kind: backend
provides_tools:
  - cursor_create_session
  - cursor_send_message
  - cursor_status
  - cursor_stop
  - cursor_events
  - cursor_list
